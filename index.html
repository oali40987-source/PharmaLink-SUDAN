<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffffff, #e6e6fa);
            transition: background-color 0.5s;
        }
        .dark-mode {
            background: linear-gradient(to right, #333, #666);
            color: #fff;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        .chatbot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 100;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <h1>Professional Pharmacy Management System</h1>
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </nav>
    <main role="main">
        <section id="statistics">
            <h2>Statistics</h2>
            <p>Total prescriptions: <span id="total-prescriptions">0</span></p>
            <p>Active customers: <span id="active-customers">0</span></p>
        </section>
        <section>
            <h2>AI Customer Support Chatbot</h2>
            <button onclick="toggleChatbot()">Chat with Support</button>
            <div class="chatbot" id="chatbot">
                <h3>Chatbot</h3>
                <div id="chatbox">
                    <p>Welcome to our AI-Powered support! How can I assist you today?</p>
                </div>
                <input type="text" id="userInput" placeholder="Type your message..." aria-label="User input for chatbot"/>
                <button onclick="sendMessage()">Send</button>
                <button onclick="toggleChatbot()">Close</button>
            </div>
        </section>
    </main>
    <div class="footer">
        <p>Contact us: example@example.com | Phone: 012-345-6789</p>
    </div>

    <script>
        function toggleChatbot() {
            const chatbot = document.getElementById('chatbot');
            chatbot.style.display = chatbot.style.display === 'none' ? 'block' : 'none';
        }
        function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            const chatbox = document.getElementById('chatbox');
            chatbox.innerHTML += `<p><strong>You:</strong> ${userInput}</p>`;
            document.getElementById('userInput').value = '';
            // Here we would add AI responses
        }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
